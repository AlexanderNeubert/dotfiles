# =============================================================================
# Fonts
# =============================================================================

font_family      GeistMono Nerd Font Medium
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Verify the PostScript name with: kitty list-fonts --psnames
font_features GeistMonoNFM-Medium +calt +liga +clig

# =============================================================================
# Window
# =============================================================================

background_opacity      0.9
hide_window_decorations titlebar-only
window_padding_width    10
remember_window_size    yes

# =============================================================================
# Colors — Poimandres
# =============================================================================

foreground           #a6accd
background           #1b1e28
cursor               #a6accd
cursor_text_color    #1b1e28
selection_foreground #1b1e28
selection_background #a6accd

color0  #1b1e28
color8  #a6accd
color1  #d0679d
color9  #d0679d
color2  #5de4c7
color10 #5de4c7
color3  #fffac2
color11 #fffac2
color4  #89ddff
color12 #89ddff
color5  #fcc5e9
color13 #fcc5e9
color6  #add7ff
color14 #add7ff
color7  #ffffff
color15 #ffffff

# =============================================================================
# Tab bar
# =============================================================================

tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
tab_title_template      " {index}: {title} "
active_tab_foreground   #1b1e28
active_tab_background   #5de4c7
active_tab_font_style   bold
inactive_tab_foreground #a6accd
inactive_tab_background #1b1e28
inactive_tab_font_style normal

# =============================================================================
# Layouts
# =============================================================================

enabled_layouts splits,stack

# =============================================================================
# Key bindings — leader is ctrl+a (use ctrl+a><key> sequences)
# =============================================================================

# Split panes
map ctrl+a>backslash launch --location=vsplit --cwd=current
map ctrl+a>minus     launch --location=hsplit --cwd=current

# Navigate panes (note: cmd+h conflicts with macOS "Hide window")
map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

# Resize panes
map cmd+shift+h resize_window narrower 5
map cmd+shift+l resize_window wider 5
map cmd+shift+j resize_window taller 5
map cmd+shift+k resize_window shorter 5

# Zoom — stack layout shows only the focused window, toggling back restores splits
map ctrl+a>m toggle_layout stack

# Scrollback (closest equivalent to copy mode)
map ctrl+a>[ show_scrollback

# Tabs
map ctrl+a>c new_tab
map ctrl+a>x close_tab
map ctrl+a>p previous_tab
map ctrl+a>n next_tab

# Move current window to front (partial equivalent of SwapWithActive)
map cmd+s move_window_to_top

# Jump to tab by number
map ctrl+a>1 goto_tab 1
map ctrl+a>2 goto_tab 2
map ctrl+a>3 goto_tab 3
map ctrl+a>4 goto_tab 4
map ctrl+a>5 goto_tab 5
map ctrl+a>6 goto_tab 6
map ctrl+a>7 goto_tab 7
map ctrl+a>8 goto_tab 8
map ctrl+a>9 goto_tab 9
