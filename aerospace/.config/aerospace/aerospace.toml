# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

after-login-command = []

after-startup-command = [
  'exec-and-forget borders active_color=0xff89b4fa inactive_color=0xff45475a width=4.0',
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

[mode.main.binding]

# App shortcuts
alt-shift-enter = 'exec-and-forget open -a "Kitty"'
alt-shift-b = 'exec-and-forget open -a "Firefox"'
alt-shift-e = 'exec-and-forget open -a "Visual Studio Code"'
alt-shift-s = 'exec-and-forget open -a "Slack"'
alt-shift-w = 'exec-and-forget open -a "Obsidian"'

# Hyprland-style actions
alt-c = 'close'
alt-t = 'layout floating tiling'
alt-f = 'fullscreen --no-outer-gaps'
alt-r = 'mode resize'
alt-shift-semicolon = 'mode service'

# Layout toggles
#alt-slash = 'layout tiles horizontal vertical'
#alt-comma = 'layout accordion horizontal vertical'

# Focus windows
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Focus monitors
alt-ctrl-h = 'focus-monitor --wrap-around left'
alt-ctrl-j = 'focus-monitor --wrap-around down'
alt-ctrl-k = 'focus-monitor --wrap-around up'
alt-ctrl-l = 'focus-monitor --wrap-around right'

# Move windows across monitors
alt-shift-ctrl-h = 'move-node-to-monitor --focus-follows-window --wrap-around left'
alt-shift-ctrl-j = 'move-node-to-monitor --focus-follows-window --wrap-around down'
alt-shift-ctrl-k = 'move-node-to-monitor --focus-follows-window --wrap-around up'
alt-shift-ctrl-l = 'move-node-to-monitor --focus-follows-window --wrap-around right'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

alt-ctrl-1 = 'summon-workspace 1'
alt-ctrl-2 = 'summon-workspace 2'
alt-ctrl-3 = 'summon-workspace 3'
alt-ctrl-4 = 'summon-workspace 4'
alt-ctrl-5 = 'summon-workspace 5'
alt-ctrl-6 = 'summon-workspace 6'
alt-ctrl-7 = 'summon-workspace 7'
alt-ctrl-8 = 'summon-workspace 8'
alt-ctrl-9 = 'summon-workspace 9'
alt-ctrl-0 = 'summon-workspace 10'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

[mode.resize.binding]
esc = 'mode main'
enter = 'mode main'
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'

[mode.service.binding]
esc = 'mode main'
r = ['reload-config', 'mode main']
f = ['flatten-workspace-tree', 'mode main']
b = ['balance-sizes', 'mode main']
t = ['layout tiles horizontal vertical', 'mode main']
a = ['layout accordion horizontal vertical', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']
